<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리뷰 스퀘어 생성기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>✨ 리뷰 스퀘어 생성기</h1>
        <p>리뷰 텍스트를 입력하고 예쁜 정사각형 카드를 만들어보세요!</p>
      </header>

      <div class="input-section">
        <div class="form-group">
          <label for="reviewTitle">제목 (선택)</label>
          <input type="text" id="reviewTitle" placeholder="예: 정말 만족스러운 구매였어요!" />
        </div>

        <div class="form-group">
          <label for="reviewText">리뷰 텍스트</label>
          <textarea
            id="reviewText"
            placeholder="리뷰 내용을 여기에 붙여넣으세요..."
            rows="4"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="reviewerName">작성자 이름 (선택)</label>
          <input type="text" id="reviewerName" placeholder="예: 김철수" />
        </div>

        <div class="form-group">
          <label for="rating">별점</label>
          <div class="rating-input">
            <button class="star-btn" data-rating="1">★</button>
            <button class="star-btn" data-rating="2">★★</button>
            <button class="star-btn" data-rating="3">★★★</button>
            <button class="star-btn active" data-rating="4">★★★★</button>
            <button class="star-btn" data-rating="5">★★★★★</button>
          </div>
        </div>

        <button id="generateBtn" class="generate-btn">카드 생성하기</button>
      </div>

      <div class="preview-section">
        <h2>미리보기</h2>
        <div class="card-wrapper">
          <div class="review-card" id="reviewCard">
            <div class="speech-bubble">
              <div class="rating-stars" id="previewStars">★★★★</div>
              <div class="review-title" id="previewTitle" style="display:none;"></div>
              <div class="review-text" id="previewText">
                여기에 리뷰 내용이 표시됩니다
              </div>
            </div>
          </div>
        </div>

        <button id="downloadBtn" class="download-btn">이미지로 다운로드</button>
      </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
